<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIRIUS Ui | 选择语言 / Choose Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', 'Inter', system-ui, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f2b3c, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
        }

        .logo .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #4a627a;
            margin-top: 0.5rem;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
            margin-top: 2.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem 2rem;
            width: 260px;
            text-align: center;
            transition: all 0.25s ease;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.2);
            border-color: rgba(100, 108, 255, 0.3);
        }

        .card-icon {
            font-size: 3.2rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card p {
            font-size: 0.9rem;
            color: #5b6e8c;
            line-height: 1.4;
        }

        .footer {
            margin-top: 3.5rem;
            font-size: 0.8rem;
            color: #7c8ba0;
        }

        @media (max-width: 560px) {
            .card {
                width: 100%;
                max-width: 280px;
                padding: 1.5rem;
            }
            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>SIRIUS Ui</h1>
        <div class="badge">Json UI Engine · 数据驱动界面</div>
    </div>

    <div class="card-grid">
        <a href="wiki_zh.html" class="card">
            <div class="card-icon">🇨🇳</div>
            <h2>中文百科</h2>
            <p>完整配置指南、坐标系统、按钮样式与表达式参考</p>
        </a>
        <a href="wiki_en.html" class="card">
            <div class="card-icon">🇬🇧</div>
            <h2>English Wiki</h2>
            <p>Complete configuration, coordinate system, button styles & expression reference</p>
        </a>
    </div>

    <div class="footer">
        SIRIUS Ui · 通过资源包自定义 Minecraft 界面<br>
        Customize Minecraft UI with resource packs
    </div>
</div>
</body>
</html>
